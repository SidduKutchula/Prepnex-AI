<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Prepnex AI â€” AI-powered interview preparation platform with custom roadmaps, tailored questions, and ATS resume builder." />
  <title>Prepnex AI</title>

  <!--
      CRITICAL: Apply theme BEFORE React loads to prevent flash.
      Reads localStorage and sets data-theme on <html> synchronously.
      This must be an inline script (not deferred) so it runs before any paint.
    -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <!-- Font preconnect for fastest possible load -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!--
      font-display=optional: never blocks render, never causes text reflow.
      The browser uses the fallback font if Inter hasn't cached yet,
      and silently swaps only on the NEXT page load. Zero FOUT.
    -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Sora:wght@400;500;600;700;800&display=optional"
    rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
